name: Promote sitio-dashboard to production

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract current image from staging
        id: image
        run: |
          IMAGE=$(grep 'image: vcp.ocir.io/axtvnrdemzo7/sitio-dashboard:' \
            apps/sitio-staging/sitio-dashboard/deployment.yaml | \
            sed 's/.*image: //')
          echo "value=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Show extracted image
        run: |
          echo "Promoting ${{ steps.image.outputs.value }} to production"

      - name: Update production deployment
        env:
          IMAGE: ${{ steps.image.outputs.value }}
        run: |
          sed -i "s|image: vcp.ocir.io/axtvnrdemzo7/sitio-dashboard:.*|image: ${IMAGE}|" \
            apps/sitio-production/sitio-dashboard/deployment.yaml

      - name: Commit and push
        env:
          IMAGE: ${{ steps.image.outputs.value }}
        run: |
          git config user.name "sitio-promotion-bot"
          git config user.email "bot@artr.com.br"
          git add apps/sitio-production/sitio-dashboard/deployment.yaml
          git commit -m "promote sitio-dashboard to ${IMAGE}"
          git push
