apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`harbor.artr.com.br`)
      kind: Rule
      services:
        - name: harbor
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
