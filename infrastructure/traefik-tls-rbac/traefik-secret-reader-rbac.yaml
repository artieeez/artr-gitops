# Traefik runs in traefik namespace but IngressRoutes in staging/production/argocd
# reference TLS secrets in those namespaces. Traefik must be able to read those secrets.
# ServiceAccount name must match the Traefik Helm release (e.g. traefik-oci or traefik).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-tls-secret-reader
  namespace: staging
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["wildcard-artr-com-br-tls"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-tls-secret-reader
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-tls-secret-reader
subjects:
  - kind: ServiceAccount
    name: traefik-oci
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-tls-secret-reader
  namespace: production
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["wildcard-artr-com-br-tls"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-tls-secret-reader
  namespace: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-tls-secret-reader
subjects:
  - kind: ServiceAccount
    name: traefik-oci
    namespace: traefik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: traefik-tls-secret-reader
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["wildcard-artr-com-br-tls"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-tls-secret-reader
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: traefik-tls-secret-reader
subjects:
  - kind: ServiceAccount
    name: traefik-oci
    namespace: traefik
