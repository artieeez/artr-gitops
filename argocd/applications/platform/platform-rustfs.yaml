apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-rustfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: rustfs
  sources:
    # RustFS Helm chart
    - repoURL: https://charts.rustfs.com
      chart: rustfs
      targetRevision: "0.0.86"
      helm:
        releaseName: rustfs
        valueFiles:
          - $values/charts/rustfs-values.yaml
    - repoURL: https://github.com/artieeez/artr-gitops
      targetRevision: HEAD
      ref: values
    # IngressRoute + SealedSecret (apps/platform/rustfs)
    - repoURL: https://github.com/artieeez/artr-gitops
      targetRevision: HEAD
      path: apps/platform/rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
