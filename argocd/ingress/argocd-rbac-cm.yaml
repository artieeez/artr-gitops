apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Default role for users not in the "admin" group
  policy.default: role:readonly

  # Use OIDC "groups" claim from Pocket ID for RBAC
  scopes: '[groups]'

  # admin → full access; admin_view_only → read-only; everyone else → read-only
  policy.csv: |
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    g, admin, role:admin
    g, admin_view_only, role:readonly
