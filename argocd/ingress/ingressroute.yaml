apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argo.artr.com.br`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
