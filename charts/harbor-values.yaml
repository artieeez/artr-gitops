# Harbor Helm values – TLS is terminated at Traefik via IngressRoute (harbor/ingressroute.yaml).
# See: https://github.com/goharbor/harbor-helm#configuration

externalURL: https://harbor.artr.com.br

# Fully qualified images (required when cluster enforces short-name resolution, e.g. CRI-O)
nginx:
  image:
    repository: docker.io/goharbor/nginx-photon
portal:
  image:
    repository: docker.io/goharbor/harbor-portal
core:
  image:
    repository: docker.io/goharbor/harbor-core
jobservice:
  image:
    repository: docker.io/goharbor/harbor-jobservice
registry:
  registry:
    image:
      repository: docker.io/goharbor/registry-photon
  controller:
    image:
      repository: docker.io/goharbor/harbor-registryctl
trivy:
  image:
    repository: docker.io/goharbor/trivy-adapter-photon
database:
  internal:
    image:
      repository: docker.io/goharbor/harbor-db
redis:
  internal:
    image:
      repository: docker.io/goharbor/redis-photon
exporter:
  image:
    repository: docker.io/goharbor/harbor-exporter

# Use ClusterIP so the chart does not create an Ingress; Traefik IngressRoute handles routing + TLS.
expose:
  type: clusterIP
  clusterIP:
    name: harbor
  # TLS is terminated at Traefik (IngressRoute), not at Harbor
  tls:
    enabled: false
    # Required by chart template (nginx/secret.yaml) even when TLS is disabled
    auto:
      commonName: harbor.artr.com.br

# Admin password from existing Secret (SealedSecret in harbor/harbor-admin-password-sealed.yaml)
existingSecretAdminPassword: harbor-admin-password
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

# Encryption key for Harbor data (must be 16 chars). From SealedSecret harbor/harbor-secret-key-sealed.yaml
existingSecretSecretKey: harbor-secret-key

# Persistence on NFS via nfs-subdir-external-provisioner (StorageClass: nfs-client)
persistence:
  enabled: true
  resourcePolicy: keep
  persistentVolumeClaim:
    registry:
      storageClass: nfs-client
    jobservice:
      jobLog:
        storageClass: nfs-client
    database:
      storageClass: nfs-client
    redis:
      storageClass: nfs-client
    trivy:
      storageClass: nfs-client
