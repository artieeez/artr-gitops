# Grafana Loki — SingleBinary, filesystem on PVC (aligned with monitoring nfs-client).
# Chart: grafana/loki

# Loki Canary (loki-canary-*) pushes synthetic probe logs to Loki; Grafana may show them as
# unknown_service / noisy streams. Disable unless you rely on canary-based health checks.
lokiCanary:
  enabled: false

# Chart validate.yaml requires canary when test.enabled is true; disable Helm tests if canary is off.
test:
  enabled: false

deploymentMode: SingleBinary

# containerd short-name mode (e.g. OCI) requires fully qualified image references.
memcached:
  image:
    repository: docker.io/library/memcached
    tag: 1.6.39-alpine

memcachedExporter:
  image:
    repository: docker.io/prom/memcached-exporter
    tag: v0.15.4

minio:
  enabled: false

# Default chunks cache uses allocatedMemory 8192 → ~9830Mi requests (too large for small nodes).
chunksCache:
  allocatedMemory: 512
  allocatedCPU: 100m

resultsCache:
  allocatedMemory: 256
  allocatedCPU: 100m

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: nfs-client
    size: 20Gi

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
