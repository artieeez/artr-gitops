# Pi-hole – DNS via Traefik NLB (IngressRouteUDP/TCP in apps/platform/pihole/), HTTPS UI + TinyAuth.
# Chart: https://mojo2600.github.io/pihole-kubernetes/  (pihole 2.35.0)
# Image: https://github.com/pi-hole/docker-pi-hole/releases  (2026.06.0)
# Fully qualified image required on OKE/CRI-O (short name mode enforcing).

image:
  repository: docker.io/pihole/pihole
  tag: "2026.07.2"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceDns:
  type: ClusterIP
  mixedService: true
  # L3 tailnet ingress via Tailscale operator (public Traefik NLB path unchanged).
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "pihole-dns"

serviceDhcp:
  enabled: false

serviceWeb:
  type: ClusterIP

ingress:
  enabled: false

virtualHost: pihole.artr.com.br

admin:
  enabled: false

persistentVolumeClaim:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  storageClass: nfs-client

# Empty = chart omits FTLCONF_dns_upstreams so upstreams are editable in the web UI
# (Settings → DNS). Persists on the PVC below. Chart defaults are Google DNS if left unset.
DNS1: ""
DNS2: ""

extraEnvVars:
  FTLCONF_dns_listeningMode: "all"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
