# Pi-hole – DNS via Traefik NLB (IngressRouteUDP/TCP in apps/platform/pihole/), HTTPS UI + TinyAuth.
# Chart: https://mojo2600.github.io/pihole-kubernetes/  (pihole 2.35.0)
# Fully qualified image required on OKE/CRI-O (short name mode enforcing).

image:
  repository: docker.io/pihole/pihole
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

serviceDns:
  type: ClusterIP
  mixedService: true
  # L3 tailnet ingress via Tailscale operator (public Traefik NLB path unchanged).
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "pihole-dns"

serviceDhcp:
  enabled: false

serviceWeb:
  type: ClusterIP

ingress:
  enabled: false

virtualHost: pihole.artr.com.br

admin:
  enabled: false

persistentVolumeClaim:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 2Gi
  storageClass: nfs-client

DNS1: "1.1.1.3"
DNS2: "1.0.0.3"

extraEnvVars:
  FTLCONF_dns_listeningMode: "all"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
