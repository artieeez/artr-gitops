crds:
  enabled: false

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  # OIDC client secret from Secret (create via SealedSecret; see apps/monitoring/grafana/README.md)
  envFromSecret: grafana-oidc-secret
  grafana.ini:
    server:
      root_url: https://grafana.artr.com.br
    auth.generic_oauth:
      enabled: true
      name: Pocket ID
      allow_sign_up: true
      # client_id and client_secret from env (Secret grafana-oidc-secret)
      scopes: openid profile email groups
      auth_url: https://pocketid.artr.com.br/authorize
      token_url: https://pocketid.artr.com.br/api/oidc/token
      api_url: https://pocketid.artr.com.br/api/oidc/userinfo
      role_attribute_path: contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'admin_view_only') && 'Viewer' || 'Viewer'
      allow_assign_grafana_admin: true
  persistence:
    enabled: true
    type: pvc
    storageClassName: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 10Gi

