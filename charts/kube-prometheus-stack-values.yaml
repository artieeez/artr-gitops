crds:
  enabled: false

additionalPrometheusRulesMap:
  cert-manager:
    groups:
      - name: cert-manager
        rules:
          - alert: CertManagerCertificateNotReady
            expr: |
              max by (name, namespace) (
                certmanager_certificate_ready_status{condition="False"} == 1
              )
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} is not Ready"
              description: "cert-manager has not issued or renewed this certificate for 15+ minutes. Check ACME challenges and Cloudflare token."
          - alert: CertManagerCertificateExpirySoon
            expr: |
              (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 21
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanize }} days"
              description: "Renewal should happen automatically ~30 days before expiry. Investigate if this persists."

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/slack-api-url
    inhibit_rules:
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
      - equal:
          - namespace
        source_matchers:
          - alertname = InfoInhibitor
        target_matchers:
          - severity = info
      - target_matchers:
          - alertname = InfoInhibitor
    route:
      receiver: "null"
      group_by:
        - namespace
        - alertname
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - receiver: slack-infra
          matchers:
            - alertname =~ "CertManager.*|Tls.*"
          group_by:
            - alertname
            - namespace
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          continue: false
        - receiver: "null"
          matchers:
            - alertname = Watchdog
    receivers:
      - name: "null"
      - name: slack-infra
        slack_configs:
          - send_resolved: true
            title: '{{ if eq .Status "firing" }}:rotating_light:{{ else }}:white_check_mark:{{ end }} {{ .CommonLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ if .Labels.namespace }}namespace: `{{ .Labels.namespace }}`{{ end }}{{ if .Labels.name }} · cert: `{{ .Labels.name }}`{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: Certificates
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      cert-manager:
        gnetId: 22184
        revision: 1
        datasource: Prometheus
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
  # OIDC client secret from Secret (create via SealedSecret; see apps/monitoring/grafana/README.md)
  envFromSecret: grafana-oidc-secret
  grafana.ini:
    server:
      root_url: https://grafana.artr.com.br
    auth.generic_oauth:
      enabled: true
      name: Pocket ID
      allow_sign_up: true
      # client_id and client_secret from env (Secret grafana-oidc-secret)
      scopes: openid profile email groups
      auth_url: https://pocketid.artr.com.br/authorize
      token_url: https://pocketid.artr.com.br/api/oidc/token
      api_url: https://pocketid.artr.com.br/api/oidc/userinfo
      role_attribute_path: contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'admin_view_only') && 'Viewer' || 'Viewer'
      allow_assign_grafana_admin: true
  persistence:
    enabled: true
    type: pvc
    storageClassName: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 10Gi

