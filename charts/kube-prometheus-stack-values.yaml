crds:
  enabled: false

additionalPrometheusRulesMap:
  cert-manager:
    groups:
      - name: cert-manager
        rules:
          - alert: CertManagerCertificateNotReady
            expr: |
              max by (name, namespace) (
                certmanager_certificate_ready_status{condition="False"} == 1
              )
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} is not Ready"
              description: "cert-manager has not issued or renewed this certificate for 15+ minutes. Check ACME challenges and Cloudflare token."
          - alert: CertManagerCertificateExpirySoon
            expr: |
              (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 21
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in {{ $value | humanize }} days"
              description: "Renewal should happen automatically ~30 days before expiry. Investigate if this persists."

prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
  # OIDC client secret from Secret (create via SealedSecret; see apps/monitoring/grafana/README.md)
  envFromSecret: grafana-oidc-secret
  grafana.ini:
    server:
      root_url: https://grafana.artr.com.br
    auth.generic_oauth:
      enabled: true
      name: Pocket ID
      allow_sign_up: true
      # client_id and client_secret from env (Secret grafana-oidc-secret)
      scopes: openid profile email groups
      auth_url: https://pocketid.artr.com.br/authorize
      token_url: https://pocketid.artr.com.br/api/oidc/token
      api_url: https://pocketid.artr.com.br/api/oidc/userinfo
      role_attribute_path: contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'admin_view_only') && 'Viewer' || 'Viewer'
      allow_assign_grafana_admin: true
  persistence:
    enabled: true
    type: pvc
    storageClassName: nfs-client
    accessModes:
      - ReadWriteOnce
    size: 10Gi

