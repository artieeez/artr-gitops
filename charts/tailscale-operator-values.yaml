# Tailscale Kubernetes Operator – exposes cluster Services on the tailnet.
# OAuth: create operator-oauth Secret in tailscale namespace (see docs/tailscale-pihole-setup.md).
# Chart: https://pkgs.tailscale.com/helmcharts/tailscale-operator

installCRDs: true

operatorConfig:
  defaultTags:
    - "tag:k8s-operator"
  logging: "info"
  hostname: "tailscale-operator"
  image:
    # OKE/CRI-O short-name mode requires a fully qualified image reference.
    repository: docker.io/tailscale/k8s-operator
  nodeSelector:
    kubernetes.io/os: linux

proxyConfig:
  image:
    repository: docker.io/tailscale/tailscale
