# Single wildcard cert in cert-manager; reflector copies the Secret to other namespaces.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-artr-com-br
  namespace: cert-manager
spec:
  secretName: wildcard-artr-com-br-tls
  dnsNames:
    - artr.com.br
    - "*.artr.com.br"
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "argocd,staging,production,platform,monitoring,sitio-staging"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "argocd,staging,production,platform,monitoring,sitio-staging"
