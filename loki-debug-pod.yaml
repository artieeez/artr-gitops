apiVersion: v1
kind: Pod
metadata:
  name: loki-volume-debug
  namespace: monitoring
spec:
  containers:
    - name: shell
      image: docker.io/library/busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /var/loki
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: pvc-52d3e50f-4607-4e45-85c7-93355e1bdf2b