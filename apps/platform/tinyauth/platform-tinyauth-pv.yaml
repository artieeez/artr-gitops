apiVersion: v1
kind: PersistentVolume
metadata:
  name: platform-tinyauth-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""        # static NFS PV (no StorageClass)
  nfs:
    # Must match the ClusterIP of the nfs-server Service.
    server: 10.96.0.100
    path: /platform-tinyauth

