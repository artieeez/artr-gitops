apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs
  namespace: rustfs
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rustfs.artr.com.br`)
      kind: Rule
      services:
        - name: rustfs
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
