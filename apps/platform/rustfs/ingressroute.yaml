apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs
  namespace: platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rustfs.artr.com.br`)
      kind: Rule
      services:
        - name: platform-platform-rustfs
          port: 9001
  tls:
    secretName: wildcard-artr-com-br-tls
