# NFS is mounted in an init container (pod DNS works); mount persists so filebrowser sees existing config/db.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: platform
  labels:
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nfs-server
              namespaces:
                - platform
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: nfs-mount
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              for i in $(seq 1 24); do
                if mount -t nfs -o vers=4 nfs-server.platform.svc.cluster.local:/ /shared/data && \
                   mount -t nfs -o vers=4 nfs-server.platform.svc.cluster.local:/platform-filebrowser /shared/config; then
                  echo "NFS mounted successfully"
                  exit 0
                fi
                umount /shared/config 2>/dev/null || true
                umount /shared/data 2>/dev/null || true
                echo "Mount attempt $i failed, retrying in 5s..."
                sleep 5
              done
              echo "NFS mount failed after 24 attempts"
              exit 1
          securityContext:
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /shared/data
              mountPropagation: Bidirectional
            - name: config
              mountPath: /shared/config
              mountPropagation: Bidirectional
        - name: ensure-config
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /config-data/config.yaml ]; then
                echo 'server:
  database: "/home/filebrowser/data/database.db"
  sources:
    - path: "/srv"
      config:
        defaultEnabled: true
auth:
  adminUsername: admin' > /config-data/config.yaml
                echo "Created default config.yaml"
              fi
          volumeMounts:
            - name: config
              mountPath: /config-data
              mountPropagation: HostToContainer
      containers:
        - name: filebrowser
          image: docker.io/gtstef/filebrowser:1.2.1-stable
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            # First login: admin / (password from secret). Set via: kubectl create secret generic filebrowser-admin -n platform --from-literal=password=YOUR_PASSWORD
            - name: FILEBROWSER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filebrowser-admin
                  key: password
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /srv
              mountPropagation: HostToContainer
            # App expects config + SQLite DB here (not /config); must persist for users/settings.
            - name: config
              mountPath: /home/filebrowser/data
              mountPropagation: HostToContainer
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          emptyDir: {}
