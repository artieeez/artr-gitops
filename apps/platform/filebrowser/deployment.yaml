apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: platform
  labels:
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      containers:
        - name: filebrowser
          image: docker.io/gtstef/filebrowser:1.2.2-stable
          ports:
            - containerPort: 80
              name: http
          env:
            # First login: admin / (password from secret). Set via: kubectl create secret generic filebrowser-admin -n platform --from-literal=password=YOUR_PASSWORD
            - name: FILEBROWSER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filebrowser-admin
                  key: password
                  optional: true
            - name: FILEBROWSER_CONFIG
              value: "/etc/filebrowser/config.yaml"
          volumeMounts:
            # PVC-backed NFS volume used for both files and DB.
            - name: fb-data
              mountPath: /srv
            - name: fb-data
              mountPath: /home/filebrowser/data
            # Read-only config file from ConfigMap, points DB to /home/filebrowser/data/database.db and source to /srv.
            - name: filebrowser-config
              mountPath: /etc/filebrowser
              readOnly: true
      volumes:
        - name: fb-data
          persistentVolumeClaim:
            claimName: platform-filebrowser-data
        - name: filebrowser-config
          configMap:
            name: filebrowser-config
