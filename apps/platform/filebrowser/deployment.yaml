# NFS is mounted by a sidecar (pod DNS works); shared to filebrowser via mountPropagation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: platform
  labels:
    app: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nfs-server
              namespaces:
                - platform
              topologyKey: kubernetes.io/hostname
      containers:
        - name: nfs-mount
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mount -t nfs nfs-server.platform.svc.cluster.local:/exports /shared/data
              mount -t nfs nfs-server.platform.svc.cluster.local:/exports/review/filebrowser /shared/config
              exec sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: data
              mountPath: /shared/data
              mountPropagation: Bidirectional
            - name: config
              mountPath: /shared/config
              mountPropagation: Bidirectional
        - name: filebrowser
          image: docker.io/gtstef/filebrowser:1.2.1-stable
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            # First login: admin / (password from secret). Set via: kubectl create secret generic filebrowser-admin -n platform --from-literal=password=YOUR_PASSWORD
            - name: FILEBROWSER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filebrowser-admin
                  key: password
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /srv
              mountPropagation: HostToContainer
            - name: config
              mountPath: /config
              mountPropagation: HostToContainer
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          emptyDir: {}
