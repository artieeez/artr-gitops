# NFS PV pointing at the in-cluster NFS server. Apps use shared-nfs-pvc with subPath
# (e.g. staging-postgre, platform-filebrowser).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: shared-nfs-export
  annotations:
    # PV has no ArgoCD built-in health; without this the app stays Progressing.
    argocd.argoproj.io/ignore-healthcheck: "true"
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""   # Must match PVC; no class for static NFS PV
  nfs:
    server: nfs-server.platform.svc.cluster.local
    path: /exports
