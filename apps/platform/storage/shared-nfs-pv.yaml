# NFS PV pointing at the in-cluster NFS server. Apps use shared-nfs-pvc with subPath
# (e.g. review/shared-postgre-db, production/shared-postgre-db).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: shared-nfs-export
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""   # Must match PVC; no class for static NFS PV
  nfs:
    server: 10.96.0.100
    path: /exports
