# Shared NFS PVC for apps. Use with volumeMounts.subPath: "staging-postgre"
# or "platform-filebrowser" (and reference this PVC from app namespaces as needed).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-nfs
  namespace: platform
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  volumeName: shared-nfs-export
  storageClassName: ""   # NFS PV has no class; empty prevents default class so binding works
