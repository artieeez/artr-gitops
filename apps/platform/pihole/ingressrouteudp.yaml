# UDP DNS → Traefik entryPoint dnsudp (charts/traefik-values.yaml) → Pi-hole
apiVersion: traefik.io/v1alpha1
kind: IngressRouteUDP
metadata:
  name: pihole-dns-udp
  namespace: platform
spec:
  entryPoints:
    - dnsudp
  routes:
    - services:
        - name: pihole-dns
          namespace: platform
          port: dns-udp
          # Pod IPs directly — kube-proxy/ClusterIP + UDP often fails; TCP may still work with nativeLB.
          nativeLB: false
