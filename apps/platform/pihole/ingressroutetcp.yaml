# TCP DNS (large responses / fallback) → Traefik entryPoint dnstcp → Pi-hole
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: pihole-dns-tcp
  namespace: platform
spec:
  entryPoints:
    - dnstcp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: pihole-dns
          namespace: platform
          port: dns
          nativeLB: false
