apiVersion: apps/v1
kind: Deployment
metadata:
  name: sealed-secrets-web
  namespace: platform
  labels:
    app: sealed-secrets-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sealed-secrets-web
  template:
    metadata:
      labels:
        app: sealed-secrets-web
    spec:
      serviceAccountName: sealed-secrets-web
      securityContext:
        runAsUser: 1001
        runAsGroup: 1000
      containers:
        - name: sealed-secrets-web
          image: ghcr.io/bakito/sealed-secrets-web:v3.1.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "--sealed-secrets-service-namespace=sealed-secrets"
            - "--sealed-secrets-service-name=sealed-secrets"
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 15
            timeoutSeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
