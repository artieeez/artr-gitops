apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tinyauth-forwardauth
  namespace: platform
spec:
  forwardAuth:
    address: http://tinyauth.platform.svc.cluster.local:3000/api/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Email
      - Remote-Name
      - Remote-Groups
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sealed-secrets-web
  namespace: platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`secrets.artr.com.br`)
      kind: Rule
      middlewares:
        - name: tinyauth-forwardauth
      services:
        - name: sealed-secrets-web
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
