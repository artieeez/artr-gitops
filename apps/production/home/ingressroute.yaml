# Public portfolio + /up; TinyAuth only on Admin (ADR-005).
# Middleware tinyauth-forwardauth is owned by apps/<env>/hello-world.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home
  namespace: production
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`artr.com.br`) && PathPrefix(`/admin`)
      kind: Rule
      priority: 100
      middlewares:
        - name: tinyauth-forwardauth
      services:
        - name: home
          port: 80
    - match: Host(`artr.com.br`)
      kind: Rule
      priority: 10
      services:
        - name: home
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
