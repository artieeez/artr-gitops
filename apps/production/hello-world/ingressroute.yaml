apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tinyauth-forwardauth
  namespace: production
spec:
  forwardAuth:
    address: http://tinyauth.platform.svc.cluster.local:3000/api/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Email
      - Remote-Name
      - Remote-Groups
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hello-world-strip-prefix
  namespace: production
spec:
  stripPrefix:
    prefixes:
      - /hello
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello-world-route
  namespace: production
spec:
  entryPoints:
    - websecure
  routes:
    - match: PathPrefix(`/hello`)
      kind: Rule
      middlewares:
        - name: tinyauth-forwardauth
        - name: hello-world-strip-prefix
      services:
        - name: hello-world
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
 
