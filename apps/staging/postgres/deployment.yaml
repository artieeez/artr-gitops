# NFS is mounted by a sidecar (pod DNS works); shared to postgres via mountPropagation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: staging
  labels:
    app: postgres
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        environment: staging
    spec:
      containers:
        - name: nfs-mount
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              mount -t nfs -o vers=4 nfs-server.platform.svc.cluster.local:/exports/review/shared-postgre-db /shared/pgdata
              exec sleep infinity
          securityContext:
            privileged: true
          volumeMounts:
            - name: pgdata
              mountPath: /shared/pgdata
              mountPropagation: Bidirectional
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-staging-auth
                  key: password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              mountPropagation: HostToContainer
      volumes:
        - name: pgdata
          emptyDir: {}
