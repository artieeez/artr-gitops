# NFS is mounted in an init container (pod DNS works); mount persists so postgres sees existing data.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: staging
  labels:
    app: postgres
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        environment: staging
    spec:
      initContainers:
        - name: nfs-mount
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              for i in $(seq 1 24); do
                if mount -t nfs -o vers=4 nfs-server.platform.svc.cluster.local:/staging-postgre /shared/pgdata; then
                  echo "NFS mounted successfully"
                  exit 0
                fi
                umount /shared/pgdata 2>/dev/null || true
                echo "Mount attempt $i failed, retrying in 5s..."
                sleep 5
              done
              echo "NFS mount failed after 24 attempts"
              exit 1
          securityContext:
            privileged: true
          volumeMounts:
            - name: pgdata
              mountPath: /shared/pgdata
              mountPropagation: Bidirectional
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-staging-auth
                  key: password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
              mountPropagation: HostToContainer
      volumes:
        - name: pgdata
          emptyDir: {}
