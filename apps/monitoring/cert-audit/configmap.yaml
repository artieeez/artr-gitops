# Generated from scripts/audit-tls-secrets.sh — regenerate when the script changes.
apiVersion: v1
data:
  audit-tls-secrets.sh: |
    #!/usr/bin/env bash
    # Audit wildcard TLS certificate health and Reflector propagation.
    # Checks Certificate CR readiness, expiry threshold, and Reflector-managed copies.
    # Exits 1 when the certificate is not Ready, expires within 21 days, or Reflector drift is detected.
    set -euo pipefail

    SECRET_NAME="wildcard-artr-com-br-tls"
    CERT_NAME="wildcard-artr-com-br"
    SOURCE_NS="cert-manager"
    MIN_DAYS_UNTIL_EXPIRY=21
    EXPECTED_NAMESPACES=(
      argocd
      staging
      production
      platform
      monitoring
      sitio-staging
      sitio-production
    )

    EXPECTED_REFLECTS="${SOURCE_NS}/${SECRET_NAME}"

    errors=0

    days_until_expiry() {
      local expiry_date="$1"
      local expiry_epoch now_epoch
      expiry_epoch="$(date -d "${expiry_date}" +%s)"
      now_epoch="$(date +%s)"
      echo $(( (expiry_epoch - now_epoch) / 86400 ))
    }

    cert_not_after() {
      local ns="$1"
      kubectl get secret -n "${ns}" "${SECRET_NAME}" \
        -o jsonpath='{.data.tls\.crt}' | base64 -d \
        | openssl x509 -noout -enddate 2>/dev/null \
        | sed 's/notAfter=//'
    }

    if ! kubectl get secret -n "${SOURCE_NS}" "${SECRET_NAME}" &>/dev/null; then
      echo "ERROR: source secret ${SOURCE_NS}/${SECRET_NAME} not found"
      exit 1
    fi

    cert_ready="$(kubectl get certificate -n "${SOURCE_NS}" "${CERT_NAME}" \
      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
    if [[ "${cert_ready}" != "True" ]]; then
      echo "ERROR: Certificate ${SOURCE_NS}/${CERT_NAME} Ready=${cert_ready:-<missing>}"
      errors=$((errors + 1))
    else
      echo "OK:    Certificate ${SOURCE_NS}/${CERT_NAME} is Ready"
    fi

    source_expiry="$(cert_not_after "${SOURCE_NS}")"
    source_days_left="$(days_until_expiry "${source_expiry}")"
    echo "Source secret ${SOURCE_NS}/${SECRET_NAME} expires: ${source_expiry} (${source_days_left} days)"
    if [[ "${source_days_left}" -lt "${MIN_DAYS_UNTIL_EXPIRY}" ]]; then
      echo "ERROR: source cert expires in ${source_days_left} days (< ${MIN_DAYS_UNTIL_EXPIRY} day threshold)"
      errors=$((errors + 1))
    fi
    echo

    for ns in "${EXPECTED_NAMESPACES[@]}"; do
      if ! kubectl get secret -n "${ns}" "${SECRET_NAME}" &>/dev/null; then
        echo "ERROR: ${ns}/${SECRET_NAME} — missing"
        errors=$((errors + 1))
        continue
      fi

      reflects="$(kubectl get secret -n "${ns}" "${SECRET_NAME}" \
        -o jsonpath='{.metadata.annotations.reflector\.v1\.k8s\.emberstack\.com/reflects}' 2>/dev/null || true)"
      cm_cert="$(kubectl get secret -n "${ns}" "${SECRET_NAME}" \
        -o jsonpath='{.metadata.annotations.cert-manager\.io/certificate-name}' 2>/dev/null || true)"
      ns_expiry="$(cert_not_after "${ns}")"

      if [[ -n "${cm_cert}" && -z "${reflects}" ]]; then
        echo "ERROR: ${ns}/${SECRET_NAME} — orphan cert-manager secret (not Reflector-managed)"
        errors=$((errors + 1))
      elif [[ "${reflects}" != "${EXPECTED_REFLECTS}" ]]; then
        echo "ERROR: ${ns}/${SECRET_NAME} — reflects=${reflects:-<none>}, expected ${EXPECTED_REFLECTS}"
        errors=$((errors + 1))
      elif [[ "${ns_expiry}" != "${source_expiry}" ]]; then
        echo "ERROR: ${ns}/${SECRET_NAME} — cert expires ${ns_expiry}, source expires ${source_expiry}"
        errors=$((errors + 1))
      else
        echo "OK:    ${ns}/${SECRET_NAME} — Reflector copy matches source (expires ${ns_expiry})"
      fi
    done

    echo
    if [[ "${errors}" -gt 0 ]]; then
      echo "Audit failed with ${errors} issue(s). See docs/certificate-runbook.md"
      exit 1
    fi

    echo "All ${#EXPECTED_NAMESPACES[@]} namespaces have valid Reflector-managed TLS secrets."
kind: ConfigMap
metadata:
  name: cert-audit-script
  namespace: monitoring
  labels:
    app: cert-audit
