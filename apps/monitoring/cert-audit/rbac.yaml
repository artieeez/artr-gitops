apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-audit
  namespace: monitoring
  labels:
    app: cert-audit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-audit
  labels:
    app: cert-audit
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-audit
  labels:
    app: cert-audit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-audit
subjects:
  - kind: ServiceAccount
    name: cert-audit
    namespace: monitoring
