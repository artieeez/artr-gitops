apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitio-wix-webhooks
  namespace: sitio-staging
  labels:
    app: sitio-wix-webhooks
    environment: sitio-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitio-wix-webhooks
  template:
    metadata:
      labels:
        app: sitio-wix-webhooks
        environment: sitio-staging
    spec:
      imagePullSecrets:
        - name: docker-registry-pull
      containers:
        - name: sitio-wix-webhooks
          image: docker.artr.com.br/sitio-wix-webhooks-microservice:sha-8e872f1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sitio-wix-webhooks-db-url
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
