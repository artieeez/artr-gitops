apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tinyauth-forwardauth
  namespace: sitio-staging
spec:
  forwardAuth:
    address: http://tinyauth.platform.svc.cluster.local:3000/api/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Email
      - Remote-Name
      - Remote-Groups
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sitio-wix-webhooks
  namespace: sitio-staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sitio-wix-webhooks-staging.artr.com.br`) && (PathPrefix(`/webhook`) || HeaderRegexp(`X-Access-Link-Id`, `.+`))
      kind: Rule
      priority: 100
      services:
        - name: sitio-wix-webhooks
          port: 80
    - match: Host(`sitio-wix-webhooks-staging.artr.com.br`)
      kind: Rule
      priority: 1
      middlewares:
        - name: tinyauth-forwardauth
      services:
        - name: sitio-wix-webhooks
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
