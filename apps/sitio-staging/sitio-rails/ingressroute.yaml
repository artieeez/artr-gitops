# In-app auth (ADR-002) — no TinyAuth forwardAuth on Sitio routes.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sitio-rails
  namespace: sitio-staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sitio-staging.artr.com.br`)
      kind: Rule
      services:
        - name: sitio-rails
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
