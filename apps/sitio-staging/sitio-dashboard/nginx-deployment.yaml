apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitio-dashboard-nginx
  namespace: sitio-staging
  labels:
    app: sitio-dashboard-nginx
    environment: sitio-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitio-dashboard-nginx
  template:
    metadata:
      labels:
        app: sitio-dashboard-nginx
        environment: sitio-staging
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: sitio-dashboard-nginx
