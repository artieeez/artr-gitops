apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tinyauth-forwardauth
  namespace: sitio-staging
spec:
  forwardAuth:
    address: http://tinyauth.platform.svc.cluster.local:3000/api/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Email
      - Remote-Name
      - Remote-Groups
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sitio-backend
  namespace: sitio-staging
spec:
  entryPoints:
    - websecure
  routes:
    # Unauthenticated API (higher priority than Host-only rule below)
    - match: Host(`sitio-api-staging.artr.com.br`) && (PathPrefix(`/api/public/`) || Path(`/api/public`))
      kind: Rule
      priority: 100
      services:
        - name: sitio-backend
          port: 80
    - match: Host(`sitio-api-staging.artr.com.br`)
      kind: Rule
      priority: 10
      middlewares:
        - name: tinyauth-forwardauth
      services:
        - name: sitio-backend
          port: 80
  tls:
    secretName: wildcard-artr-com-br-tls
