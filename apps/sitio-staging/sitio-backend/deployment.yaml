apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitio-backend
  namespace: sitio-staging
  labels:
    app: sitio-backend
    environment: sitio-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sitio-backend
  template:
    metadata:
      labels:
        app: sitio-backend
        environment: sitio-staging
    spec:
      imagePullSecrets:
        - name: ocir-pull
      containers:
        - name: sitio-backend
          image: vcp.ocir.io/axtvnrdemzo7/sitio-backend:sha-3ed0e7b
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: CORS_ORIGINS
              value: https://sitio-staging.artr.com.br
            - name: APP_BASE_URL
              value: https://sitio-staging.artr.com.br
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sitio-backend-db-url
                  key: DATABASE_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4317"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
